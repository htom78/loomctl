name: Desktop Cross-Platform Verification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - apps/desktop/**
      - packages/loom-api/**
      - tests/desktop-profile.test.ts
      - tests/loom-api*.test.ts
      - .github/workflows/desktop-cross-platform.yml

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            linux: true
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Tauri system dependencies
        if: matrix.linux
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run build
      - name: Run desktop API golden-path tests
        run: npx tsx --test --test-concurrency=1 tests/desktop-profile.test.ts tests/loom-api.test.ts tests/loom-api-phase2.test.ts
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --target ${{ matrix.target }}
      - run: npm run web:build --workspace @loom/desktop
      - name: Build native desktop binary
        run: npm run tauri --workspace @loom/desktop -- build --no-bundle --target ${{ matrix.target }}
