name: Desktop Installed-App E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - apps/desktop/**
      - packages/loom-api/**
      - tests/desktop-installed.e2e.mjs
      - wdio.desktop.conf.mjs
      - package.json
      - package-lock.json
      - .github/workflows/desktop-e2e.yml
  pull_request:
    paths:
      - apps/desktop/**
      - packages/loom-api/**
      - tests/desktop-installed.e2e.mjs
      - wdio.desktop.conf.mjs
      - package.json
      - package-lock.json
      - .github/workflows/desktop-e2e.yml

permissions:
  contents: read

jobs:
  linux-installed-app:
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install desktop and WebDriver system dependencies
        run: sudo apt-get update && sudo apt-get install -y dbus-x11 gnome-keyring libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf ripgrep webkit2gtk-driver xvfb xdg-utils
      - run: npm ci
      - run: npm run build
      - run: npm run api:build
      - name: Install Tauri WebDriver
        run: cargo install tauri-driver --version 2.0.6 --locked
      - name: Build instrumented deb
        env:
          CI: "true"
          VITE_LOOM_E2E: "1"
        run: npm run tauri --workspace @loom/desktop -- build --ci --features e2e --bundles deb --config src-tauri/tauri.e2e.conf.json --config '{"bundle":{"createUpdaterArtifacts":false}}'
      - name: Install deb
        shell: bash
        run: |
          set -euo pipefail
          debs=(apps/desktop/src-tauri/target/release/bundle/deb/*.deb)
          test "${#debs[@]}" -eq 1
          sudo dpkg -i "${debs[0]}"
          test -x /usr/bin/loom-desktop
          rg -q '^Exec=loom-desktop %u$' '/usr/share/applications/Loom Desktop.desktop'
      - name: Run installed-app workflow
        shell: bash
        run: |
          dbus-run-session -- bash -euo pipefail -c '
            xdg-mime default "Loom Desktop.desktop" x-scheme-handler/loom
            test "$(xdg-mime query default x-scheme-handler/loom)" = "Loom Desktop.desktop"
            eval "$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets)"
            export LOOM_DESKTOP_E2E_BINARY=/usr/bin/loom-desktop
            xvfb-run --auto-servernum npm run desktop:e2e
          '
      - name: Upload WebDriver logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: loom-desktop-installed-e2e-logs
          path: .codex-tmp/wdio
          if-no-files-found: ignore
      - name: Uninstall deb
        if: always()
        run: sudo dpkg -r loom-desktop || true

  macos-installed-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm ci
      - run: npm run build
      - run: npm run api:build
      - name: Build instrumented app bundle
        env:
          CI: "true"
          VITE_LOOM_E2E: "1"
        run: npm run tauri --workspace @loom/desktop -- build --ci --no-sign --features e2e --target ${{ matrix.target }} --bundles app --config src-tauri/tauri.e2e.conf.json --config '{"bundle":{"createUpdaterArtifacts":false}}'
      - name: Install app and register deep-link handler
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          apps=(apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app)
          test "${#apps[@]}" -eq 1
          installed="$HOME/Applications/Loom Desktop.app"
          mkdir -p "$HOME/Applications"
          ditto "${apps[0]}" "$installed"
          binary="$installed/Contents/MacOS/loom-desktop"
          test -x "$binary"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleURLTypes:0:CFBundleURLSchemes:0' "$installed/Contents/Info.plist")" = loom
          /System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister -f "$installed"
          printf 'LOOM_DESKTOP_E2E_BINARY=%s\n' "$binary" >> "$GITHUB_ENV"
          printf 'LOOM_DESKTOP_E2E_DRIVER=embedded\n' >> "$GITHUB_ENV"
      - name: Run installed-app workflow
        run: npm run desktop:e2e
      - name: Upload WebDriver logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: loom-desktop-${{ matrix.target }}-installed-e2e-logs
          path: .codex-tmp/wdio
          if-no-files-found: ignore

  windows-installed-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm ci
      - run: npm run build
      - run: npm run api:build
      - name: Build instrumented NSIS installer
        env:
          CI: "true"
          VITE_LOOM_E2E: "1"
        run: npm run tauri --workspace @loom/desktop -- build --ci --no-sign --features e2e --target ${{ matrix.target }} --bundles nsis --config src-tauri/tauri.e2e.conf.json --config '{"bundle":{"createUpdaterArtifacts":false}}'
      - name: Install NSIS package and verify deep-link handler
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installers = Get-ChildItem "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis" -Filter *.exe -File
          if ($installers.Count -ne 1) { throw "Expected one NSIS installer" }
          $process = Start-Process -FilePath $installers[0].FullName -ArgumentList "/S" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "NSIS installer exited with $($process.ExitCode)" }
          $entry = Get-ItemProperty "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*", "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" -ErrorAction SilentlyContinue |
            Where-Object DisplayName -eq "Loom Desktop" |
            Select-Object -First 1
          if (-not $entry) { throw "Loom Desktop uninstall registration was not found" }
          $candidates = @()
          if ($entry.InstallLocation) { $candidates += Join-Path $entry.InstallLocation.Trim('"') "loom-desktop.exe" }
          if ($entry.DisplayIcon) { $candidates += ($entry.DisplayIcon.Trim('"') -replace ',\d+$', '') }
          $binary = $candidates | Where-Object { Test-Path $_ -PathType Leaf } | Select-Object -First 1
          if (-not $binary) {
            $binary = Get-ChildItem $env:LOCALAPPDATA -Filter loom-desktop.exe -File -Recurse | Select-Object -ExpandProperty FullName -First 1
          }
          if (-not $binary) { throw "Installed Loom Desktop binary was not found" }
          $command = (Get-Item "Registry::HKEY_CLASSES_ROOT\loom\shell\open\command").GetValue("")
          if (-not $command -or $command -notmatch '%1') { throw "loom deep-link handler is not registered" }
          "LOOM_DESKTOP_E2E_BINARY=$binary" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LOOM_DESKTOP_E2E_DRIVER=embedded" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Run installed-app workflow
        run: npm run desktop:e2e
      - name: Upload WebDriver logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: loom-desktop-${{ matrix.target }}-installed-e2e-logs
          path: .codex-tmp/wdio
          if-no-files-found: ignore
