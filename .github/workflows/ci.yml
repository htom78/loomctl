name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: loom
          POSTGRES_PASSWORD: loom
          POSTGRES_DB: loom
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loom -d loom"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      LOOM_TEST_POSTGRES_URL: postgres://loom:loom@127.0.0.1:5432/loom
      LOOM_TEST_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: npm ci
      - run: npm run build
      - run: npm test

  desktop-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb
      - run: npm ci
      - run: npm run api:build
      - run: npm run web:build --workspace @loom/desktop
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Build Linux AppImage and deb packages
        run: npm run tauri --workspace @loom/desktop -- build --ci --bundles appimage,deb --config '{"bundle":{"createUpdaterArtifacts":false}}'
      - name: Verify Linux packages and startup
        run: scripts/verify-linux-desktop-packages.sh
      - name: Verify production build excludes WebDriver instrumentation
        shell: bash
        run: |
          set -euo pipefail
          if rg -i "wdio|webdriver" apps/desktop/dist; then exit 1; fi
          if cargo tree --manifest-path apps/desktop/src-tauri/Cargo.toml --no-default-features | rg "tauri-plugin-wdio"; then exit 1; fi
      - uses: actions/upload-artifact@v7
        with:
          name: loom-desktop-linux-x64
          path: |
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
