name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Signed update channel
        required: true
        default: beta
        type: choice
        options: [beta, stable]
      include_linux:
        description: Publish Linux after macOS and Windows gates are stable
        required: true
        default: false
        type: boolean
      allow_unsigned_macos:
        description: Beta only - publish macOS without Apple signing or notarization
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  signing-preflight:
    runs-on: ubuntu-latest
    env:
      UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      UPDATER_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      ALLOW_UNSIGNED_MACOS: ${{ inputs.allow_unsigned_macos }}
      CHANNEL: ${{ inputs.channel }}
    steps:
      - name: Require updater and platform signing identities
        shell: bash
        run: |
          set -euo pipefail
          if test "$ALLOW_UNSIGNED_MACOS" = true; then
            test "$CHANNEL" = beta || { echo "Unsigned macOS artifacts are limited to the beta channel"; exit 1; }
          else
            for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
              test -n "${!name}" || { echo "Missing required signing secret: $name"; exit 1; }
            done
          fi
          for name in UPDATER_KEY UPDATER_PASSWORD WINDOWS_CERTIFICATE WINDOWS_CERTIFICATE_PASSWORD; do
            test -n "${!name}" || { echo "Missing required signing secret: $name"; exit 1; }
          done

  create-draft:
    needs: signing-preflight
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Create immutable draft release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version=$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)
          tag="desktop-${{ inputs.channel }}-v${version}"
          release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --paginate --jq ".[] | select(.tag_name == \"$tag\") | .id" | sed -n '1p')
          if test -n "$release_id"; then
            draft=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" --jq .draft)
            test "$draft" = true || { echo "Release $tag already exists and is immutable"; exit 1; }
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          fi
          title="Loom Desktop ${{ inputs.channel }} v${version}"
          if test "${{ inputs.allow_unsigned_macos }}" = true; then title="$title (unsigned macOS)"; fi
          args=(release create "$tag" --draft --generate-notes --target "$GITHUB_SHA" --title "$title")
          if test "${{ inputs.channel }}" = beta; then args+=(--prerelease); fi
          gh "${args[@]}"
          release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --paginate --jq ".[] | select(.tag_name == \"$tag\" and .draft) | .id" | sed -n '1p')
          test -n "$release_id"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  desktop:
    needs: create-draft
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            platform: macos
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: windows
    runs-on: ${{ matrix.os }}
    env:
      CI: "true"
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm ci
      - run: npm run api:build
      - name: Import Windows signing certificate
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $path = Join-Path $env:RUNNER_TEMP "loom-windows-signing.pfx"
          [IO.File]::WriteAllBytes($path, $bytes)
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $path -CertStoreLocation Cert:\CurrentUser\My -Password $password
          $configPath = "apps/desktop/src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $config.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $certificate.Thumbprint -Force
          $config | ConvertTo-Json -Depth 100 | Set-Content $configPath
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri
          releaseId: ${{ needs.create-draft.outputs.release_id }}
          retryAttempts: 2
          args: >-
            --target ${{ matrix.target }}
            ${{ matrix.platform == 'macos' && inputs.allow_unsigned_macos && '--no-sign' || '' }}
      - name: Verify macOS signature and notarization
        if: matrix.platform == 'macos' && inputs.allow_unsigned_macos == false
        shell: bash
        run: |
          set -euo pipefail
          apps=(apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app)
          dmgs=(apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          app=${apps[0]}
          dmg=${dmgs[0]}
          test -d "$app" && test -f "$dmg"
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=2 "$app"
          xcrun stapler validate "$dmg"
      - name: Verify unsigned macOS packages
        if: matrix.platform == 'macos' && inputs.allow_unsigned_macos
        shell: bash
        run: |
          set -euo pipefail
          apps=(apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app)
          dmgs=(apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          test "${#apps[@]}" -eq 1 && test -d "${apps[0]}"
          test "${#dmgs[@]}" -eq 1 && test -s "${dmgs[0]}"
          signature=$(codesign -dv --verbose=4 "${apps[0]}" 2>&1 || true)
          case "$signature" in
            *"Authority=Developer ID Application"*) echo "Unsigned beta unexpectedly used a Developer ID identity"; exit 1 ;;
          esac
      - name: Verify Windows Authenticode signatures
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $installers = Get-ChildItem apps/desktop/src-tauri/target -Recurse -File | Where-Object { $_.Extension -in '.exe', '.msi' }
          if (-not $installers) { throw "No Windows installers were produced" }
          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature $installer.FullName
            if ($signature.Status -ne 'Valid') { throw "Invalid signature: $($installer.FullName) ($($signature.Status))" }
          }

  linux:
    if: inputs.include_linux
    needs: [create-draft, desktop]
    runs-on: ubuntu-22.04
    env:
      CI: "true"
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf ripgrep xvfb
      - run: npm ci
      - run: npm run api:build
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri
          releaseId: ${{ needs.create-draft.outputs.release_id }}
          retryAttempts: 2
          args: --bundles appimage,deb
      - name: Verify Linux packages and startup
        run: scripts/verify-linux-desktop-packages.sh

  finalize-release:
    needs: [create-draft, desktop, linux]
    if: ${{ always() && needs.create-draft.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Delete failed draft release
        if: ${{ needs.desktop.result != 'success' || (needs.linux.result != 'success' && needs.linux.result != 'skipped') }}
        run: gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${{ needs.create-draft.outputs.release_id }}"
      - name: Publish immutable release and promote channel metadata
        if: ${{ needs.desktop.result == 'success' && (needs.linux.result == 'success' || needs.linux.result == 'skipped') }}
        shell: bash
        run: |
          set -euo pipefail
          release_id="${{ needs.create-draft.outputs.release_id }}"
          tag="${{ needs.create-draft.outputs.tag }}"
          version=$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)
          cleanup_draft() {
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          }
          trap cleanup_draft ERR
          node scripts/verify-desktop-release.mjs "$release_id" "$tag" "$version" "${{ inputs.include_linux }}"
          trap - ERR
          prerelease=false
          if test "${{ inputs.channel }}" = beta; then prerelease=true; fi
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" -F draft=false -F prerelease="$prerelease" >/dev/null
          node scripts/promote-desktop-release.mjs "${{ inputs.channel }}" "$tag"
