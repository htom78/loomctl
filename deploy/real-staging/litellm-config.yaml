model_list:
  - model_name: loom-stage-model
    litellm_params:
      model: openai/loom-stage-upstream
      api_base: http://model-upstream:8080/v1
      api_key: os.environ/LOOM_STAGE_UPSTREAM_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true

litellm_settings:
  drop_params: true
  set_verbose: false
