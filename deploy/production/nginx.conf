# TLS termination + reverse proxy for the two harness instances.
# Put a fullchain cert at ./tls/fullchain.pem and the key at ./tls/privkey.pem
# (mounted read-only into the nginx container at /etc/nginx/tls).
#
# This is the single trusted proxy in front of the harness, so it appends the
# real client IP as the rightmost X-Forwarded-For hop, and the serve command
# runs with --rate-limit-trusted-proxy-hops 1 to key rate limiting on it.

worker_processes auto;
events { worker_connections 1024; }

http {
  # Round-robin across the two harness instances. Both share the Postgres/Redis
  # state backend, so any instance can serve any request; run leases coordinate.
  upstream loom {
    server loom-a:8787;
    server loom-b:8787;
  }

  # Redirect plain HTTP to HTTPS.
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SSE streams (/events/stream, /audit/stream) must not be buffered or timed out.
    location ~ /stream$ {
      proxy_pass http://loom;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header Host $host;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 1h;
    }

    location / {
      proxy_pass http://loom;
      proxy_http_version 1.1;
      # Append ONLY the real client IP; the harness trusts exactly one hop.
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header Host $host;
      proxy_read_timeout 120s;
    }
  }
}
