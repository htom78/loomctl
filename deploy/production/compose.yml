# Production deployment: two harness instances behind an Nginx TLS reverse
# proxy, backed by PostgreSQL + Redis. Copy .env.example to .env and fill it in
# first. Unlike deploy/staging, this uses an isolated executor (NOT
# --allow-unsafe-local-executor) and wires the control plane and the
# reverse-proxy-aware rate limiter from the environment.
#
#   docker compose -f deploy/production/compose.yml --env-file deploy/production/.env up -d --build
#
# PostgreSQL and Redis are included for a self-contained start; for real
# production point LOOM_POSTGRES_URL / LOOM_REDIS_URL at managed instances and
# remove the postgres/redis services + their volumes.

x-loom-common: &loom-common
  build:
    context: ../..
    dockerfile: deploy/staging/Dockerfile
  restart: unless-stopped
  environment:
    LOOM_POSTGRES_URL: ${LOOM_POSTGRES_URL}
    LOOM_REDIS_URL: ${LOOM_REDIS_URL}
    LOOM_MODEL_KEY: ${LOOM_MODEL_KEY}
    LOOM_CONTROL_PLANE_TOKEN: ${LOOM_CONTROL_PLANE_TOKEN}
    LOOM_GITEA_WEBHOOK_SECRET: ${LOOM_GITEA_WEBHOOK_SECRET}
    LOOM_OPERATOR_TOKEN: ${LOOM_OPERATOR_TOKEN}
  command:
    - harness
    - serve
    - --host
    - "0.0.0.0"
    - --port
    - "8787"
    - --workspace-root
    - /data/workspaces
    - --state-backend
    - postgres-redis
    - --executor
    - docker
    - --model-base-url
    - ${LOOM_MODEL_BASE_URL}
    - --model-key-env
    - LOOM_MODEL_KEY
    - --control-plane-url
    - ${LOOM_CONTROL_PLANE_URL}
    - --control-plane-token-env
    - LOOM_CONTROL_PLANE_TOKEN
    - --control-plane-pr
    - --control-plane-merge
    - --control-plane-comment
    - --control-plane-comment-sync
    - --tenant-control-plane-token-env
    - production=LOOM_CONTROL_PLANE_TOKEN
    - --control-plane-webhook-secret-env
    - LOOM_GITEA_WEBHOOK_SECRET
    - --ingest-brain
    - --allow-tool
    - git.pr
    - --oidc-issuer
    - ${LOOM_OIDC_ISSUER}
    - --oidc-audience
    - ${LOOM_OIDC_AUDIENCE}
    - --rate-limit-trusted-proxy-hops
    - "1"
    # Operator key gating the cross-tenant /status and /metrics views. Without a
    # configured status key these endpoints are OPEN — Prometheus authenticates
    # with this token (deploy/observability), and it keeps run metadata + host
    # paths from leaking to anyone who reaches the instance.
    - --tenant-key-env
    - production=LOOM_OPERATOR_TOKEN:operator:admin
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  loom-a:
    <<: *loom-common
    volumes:
      - loom-a-workspaces:/data/workspaces
      - /var/run/docker.sock:/var/run/docker.sock

  loom-b:
    <<: *loom-common
    volumes:
      - loom-b-workspaces:/data/workspaces
      - /var/run/docker.sock:/var/run/docker.sock

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [loom-a, loom-b]
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tls:/etc/nginx/tls:ro

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: loom
      POSTGRES_PASSWORD: ${LOOM_POSTGRES_PASSWORD:-loom}
      POSTGRES_DB: loom
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loom -d loom"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - loom-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - loom-redis:/data

  # Observability stack. Opt-in: `docker compose --profile observability up -d`.
  # Prometheus scrapes both instances' operator-gated /metrics with a bearer
  # token read from ./secrets/loom_operator_token (create it with the same value
  # as LOOM_ADMIN_TOKEN; the secrets/ dir is gitignored).
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: [observability]
    restart: unless-stopped
    depends_on: [loom-a, loom-b]
    ports:
      - "9090:9090"
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/loom-alerts.yml:/etc/prometheus/loom-alerts.yml:ro
      - ./secrets/loom_operator_token:/etc/prometheus/loom_operator_token:ro

  grafana:
    image: grafana/grafana:11.2.0
    profiles: [observability]
    restart: unless-stopped
    depends_on: [prometheus]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - loom-grafana:/var/lib/grafana

volumes:
  loom-a-workspaces:
  loom-b-workspaces:
  loom-postgres:
  loom-redis:
  loom-grafana:
